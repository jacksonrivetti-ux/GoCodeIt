<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — GoCodeIt</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Go<span>Code</span>It</a>
    <div class="nav-links">
      <a href="join.html" class="btn btn-ghost">Join</a>
      <a href="signin.html" class="btn btn-primary">Sign In</a>
    </div>
  </nav>

  <!-- SIGN IN CARD -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Go<span>Code</span>It</div>
      <div class="auth-sub">// welcome back, coder</div>

      <div class="alert alert-error" id="error-msg"></div>

      <div class="form-group">
        <label for="email">EMAIL ADDRESS</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">PASSWORD</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <a href="#" class="forgot-link">Forgot your password?</a>

      <button class="btn btn-primary btn-full btn-lg" id="signin-btn">
        Sign In →
      </button>

      <div class="auth-footer-text">
        Don't have an account?
        <a href="join.html">Sign Up Here</a>
      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      GCI.redirectIfLoggedIn('dashboard.html');

      const btn = document.getElementById('signin-btn');
      const errEl = document.getElementById('error-msg');

      function showError(msg) {
        errEl.textContent = msg;
        errEl.classList.add('show');
      }

      function clearError() {
        errEl.classList.remove('show');
      }

      btn.addEventListener('click', () => {
        clearError();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          showError('Please fill in all fields.');
          return;
        }

        const result = GCI.signIn({ email, password });
        if (result.ok) {
          window.location.href = 'dashboard.html';
        } else {
          showError(result.error);
        }
      });

      // Enter key support
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') btn.click();
      });
    });
  </script>
</body>
</html>
