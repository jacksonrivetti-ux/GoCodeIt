<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — GoCodeIt</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <span class="go">Go</span><span class="code">Code</span><span class="it">It</span>
    </a>
    <div class="nav-links">
      <a href="join.html" class="btn btn-ghost">Join</a>
      <a href="signin.html" class="btn btn-primary">Sign In</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="go">Go</span><span class="code">Code</span><span class="it">It</span>
      </div>
      <div class="auth-sub">// welcome back, coder</div>

      <div class="alert alert-error" id="error-msg"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <a href="#" class="forgot-link">Forgot your password?</a>

      <button class="btn btn-primary btn-full btn-lg" id="signin-btn">Sign In →</button>

      <div class="auth-footer-text">
        Don't have an account? <a href="join.html">Sign Up Here</a>
      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      GCI.redirectIfLoggedIn('dashboard.html');
      const btn = document.getElementById('signin-btn');
      const errEl = document.getElementById('error-msg');

      btn.addEventListener('click', () => {
        errEl.classList.remove('show');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
        const r = GCI.signIn({ email, password });
        if (r.ok) { window.location.href = 'dashboard.html'; }
        else { errEl.textContent = r.error; errEl.classList.add('show'); }
      });
      document.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
    });
  </script>
</body>
</html>
