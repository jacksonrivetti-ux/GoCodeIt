<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join — GoCodeIt</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Go<span>Code</span>It</a>
    <div class="nav-links">
      <a href="join.html" class="btn btn-ghost">Join</a>
      <a href="signin.html" class="btn btn-primary">Sign In</a>
    </div>
  </nav>

  <!-- JOIN CARD -->
  <div class="auth-page">
    <div class="auth-card" style="max-width:500px;">
      <div class="auth-logo">Go<span>Code</span>It</div>
      <div class="auth-sub">// create your account — it's free</div>

      <div class="alert alert-error" id="error-msg"></div>
      <div class="alert alert-success" id="success-msg"></div>

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">FIRST NAME</label>
          <input type="text" id="firstName" placeholder="Alex" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label for="lastName">LAST NAME</label>
          <input type="text" id="lastName" placeholder="Rivera" autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label for="email">EMAIL ADDRESS</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="age">YOUR AGE</label>
        <input type="number" id="age" placeholder="16" min="0" style="max-width:120px;">
      </div>

      <div class="form-group">
        <label for="password">PASSWORD</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="confirm">CONFIRM PASSWORD</label>
        <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="join-btn" style="margin-top:0.5rem;">
        Create My Account →
      </button>

      <div class="auth-footer-text">
        Already have an account?
        <a href="signin.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      GCI.redirectIfLoggedIn('dashboard.html');

      const btn = document.getElementById('join-btn');
      const errEl = document.getElementById('error-msg');
      const sucEl = document.getElementById('success-msg');

      function showError(msg) {
        sucEl.classList.remove('show');
        errEl.textContent = msg;
        errEl.classList.add('show');
      }

      function clearMessages() {
        errEl.classList.remove('show');
        sucEl.classList.remove('show');
      }

      btn.addEventListener('click', () => {
        clearMessages();
        const firstName = document.getElementById('firstName').value.trim();
        const lastName  = document.getElementById('lastName').value.trim();
        const email     = document.getElementById('email').value.trim();
        const age       = document.getElementById('age').value.trim();
        const password  = document.getElementById('password').value;
        const confirm   = document.getElementById('confirm').value;

        if (!firstName || !lastName || !email || !age || !password || !confirm) {
          showError('Please fill in all fields.');
          return;
        }

        if (password !== confirm) {
          showError('Passwords do not match.');
          return;
        }

        const ageNum = parseInt(age, 10);
        if (isNaN(ageNum) || ageNum < 0) {
          showError('Please enter a valid age.');
          return;
        }

        const result = GCI.signUp({ firstName, lastName, email, password, age: ageNum });
        if (result.ok) {
          sucEl.textContent = 'Account created! Redirecting…';
          sucEl.classList.add('show');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
        } else {
          showError(result.error);
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') btn.click();
      });
    });
  </script>
</body>
</html>
