<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join — GoCodeIt</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <span class="go">Go</span><span class="code">Code</span><span class="it">It</span>
    </a>
    <div class="nav-links">
      <a href="join.html" class="btn btn-ghost">Join</a>
      <a href="signin.html" class="btn btn-primary">Sign In</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card" style="max-width:500px">
      <div class="auth-logo">
        <span class="go">Go</span><span class="code">Code</span><span class="it">It</span>
      </div>
      <div class="auth-sub">// create your account — it's free</div>

      <div class="alert alert-error" id="error-msg"></div>
      <div class="alert alert-success" id="success-msg"></div>

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Alex" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Rivera" autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="age">Your Age</label>
        <input type="number" id="age" placeholder="16" min="0" style="max-width:130px">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="join-btn" style="margin-top:0.5rem">
        Create My Account →
      </button>

      <div class="auth-footer-text">
        Already have an account? <a href="signin.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      GCI.redirectIfLoggedIn('dashboard.html');
      const btn = document.getElementById('join-btn');
      const errEl = document.getElementById('error-msg');
      const sucEl = document.getElementById('success-msg');

      btn.addEventListener('click', () => {
        errEl.classList.remove('show'); sucEl.classList.remove('show');
        const firstName = document.getElementById('firstName').value.trim();
        const lastName  = document.getElementById('lastName').value.trim();
        const email     = document.getElementById('email').value.trim();
        const age       = document.getElementById('age').value.trim();
        const password  = document.getElementById('password').value;
        const confirm   = document.getElementById('confirm').value;

        if (!firstName || !lastName || !email || !age || !password || !confirm) {
          errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return;
        }
        if (password !== confirm) {
          errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return;
        }
        const ageNum = parseInt(age, 10);
        if (isNaN(ageNum) || ageNum < 0) {
          errEl.textContent = 'Please enter a valid age.'; errEl.classList.add('show'); return;
        }
        const r = GCI.signUp({ firstName, lastName, email, password, age: ageNum });
        if (r.ok) {
          sucEl.textContent = 'Account created! Redirecting…'; sucEl.classList.add('show');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
        } else {
          errEl.textContent = r.error; errEl.classList.add('show');
        }
      });
      document.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
    });
  </script>
</body>
</html>
